name: open_iptv
description: Open-source, ad-free, cross-platform IPTV client.
publish_to: none
version: 0.2.4+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Player
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3

  # Navigation
  go_router: ^13.2.0

  # Networking
  http: ^1.2.1

  # XML (XMLTV parsing)
  xml: ^6.5.0

  # Images
  cached_network_image: ^3.3.1

  # Encryption (AES-256 for backup PIN)
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Archive (.iptvprofile ZIP)
  archive: ^3.6.1

  # Background audio
  audio_service: ^0.18.12

  # File operations
  file_picker: ^11.0.0
  share_plus: ^12.0.0
  path: ^1.9.0

  # App metadata
  package_info_plus: ^8.0.0

  # Utilities
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  media_kit_native_event_loop: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
